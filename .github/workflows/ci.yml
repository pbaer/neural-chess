name: CI

# Independent validation of every pull request into master: typecheck, the full
# deterministic test suite (incl. PyTorch forward-parity + the jsdom component
# tests), and a production build of both entries. This is the green check to look
# for before approving an agent PR — it doesn't trust the agent's own in-run claim.
#
# Runs with a read-only token and no secrets, so it's safe on any PR.

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

# Supersede an in-flight run when the PR branch is updated.
concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  viz:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viz
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: viz/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
