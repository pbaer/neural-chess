name: Agent — implement issue

# Turns a feedback issue into a pull request using Claude Code.
#
# Auto-starts ONLY when the issue was opened by the maintainer (@pbaer). For
# issues filed by anyone else (e.g. via the in-app Feedback button), the
# maintainer triggers the agent manually by adding the `agent-go` label.
#
# Division of labor: Claude ONLY edits files + runs the npm validation. The
# branch/commit/push/PR is done deterministically in a plain workflow step with
# explicit token auth — far more reliable than having the LLM drive git/gh (which
# also wasted turns retrying failed pushes). The agent never merges: the `master`
# ruleset requires the maintainer's Code-Owner approval (see .github/CODEOWNERS).

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write # required by claude-code-action for its OIDC token exchange
  actions: read

# One run per issue at a time.
concurrency:
  group: agent-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  implement:
    # Auto-run for the maintainer's own new issues; otherwise require `agent-go`.
    if: >
      (github.event.action == 'opened' && github.event.issue.user.login == 'pbaer') ||
      (github.event.action == 'labeled' && github.event.label.name == 'agent-go')
    runs-on: ubuntu-latest
    env:
      ISSUE: ${{ github.event.issue.number }}
      BRANCH: agent/issue-${{ github.event.issue.number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Implement with Claude
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }} # only for the decline-and-comment path
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Implement the following feature/bug request by EDITING FILES in this
            repository. You must make the actual code changes yourself — do not
            merely describe a plan, and do not stop until it is done.

            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}

            Steps:
            1. Read CLAUDE.md at the repo root (project principles, validation
               commands, test-coverage rules).
            2. Explore the relevant code under `viz/` to see how to implement this.
            3. Implement the smallest change that fully addresses the issue, matching
               existing conventions. Most changes live in `viz/`.
            4. Add or update deterministic tests for the new/changed behavior
               (UX → a `*.dom.test.tsx` component test; logic → a Node `*.test.ts`).
               No LLM/network in tests.
            5. Validate from `viz/`: run `npm ci`, then `npm run typecheck`,
               `npm test`, and `npm run build`. Fix every failure.

            You are NOT done until the feature is implemented, tests are added, and
            `npm test` and `npm run build` both pass. Do NOT end your turn with only
            a plan or a question — make the changes.

            Do NOT run git or open a PR — the workflow commits your working-tree
            changes and opens the PR automatically. ONLY exception: if the request
            genuinely violates the project principles (human-games-only data, no
            engine-derived signal, CC0 / no TWIC), make NO code changes and run
            `gh issue comment ${{ github.event.issue.number }} --body "<why>"`, then stop.
          # Bash is needed for npm; git/gh are handled by the workflow, not Claude.
          claude_args: |
            --allowedTools "Bash,Edit,MultiEdit,Write,Read,Glob,Grep,NotebookEdit,TodoWrite"
            --max-turns 80
            --model claude-opus-4-8

      # Debug aid: the action logs only init/result to the run log, so grab the
      # full turn-by-turn transcript to diagnose under-execution.
      - name: Upload Claude transcript
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: claude-transcript
          path: ${{ runner.temp }}/claude-execution-output.json
          if-no-files-found: ignore

      - name: Open pull request from the agent's changes
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git add -A
          # Nothing staged AND no commits ahead of master → agent declined / only commented.
          if git diff --cached --quiet && [ "$(git rev-list --count origin/master..HEAD)" -eq 0 ]; then
            echo "No file changes produced; skipping PR."
            exit 0
          fi
          git config user.name "claude-agent[bot]"
          git config user.email "claude-agent[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git diff --cached --quiet || git commit -m "Agent: address issue #$ISSUE"
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" "HEAD:$BRANCH"
          # Draft if the agent step didn't finish cleanly (e.g. hit max turns), so it's flagged.
          DRAFT=""
          [ "${{ steps.claude.outcome }}" = "success" ] || DRAFT="--draft"
          existing="$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || true)"
          if [ -n "$existing" ]; then
            echo "PR #$existing already open for $BRANCH; updated by the push above."
          else
            gh pr create $DRAFT --base master --head "$BRANCH" \
              --title "Agent: ${{ github.event.issue.title }} (#$ISSUE)" \
              --body "Automated fix for #$ISSUE by the Claude coding agent. Validation (typecheck/test/build) was run in the agent step. Review + approval required before merge.

          Closes #$ISSUE"
          fi
