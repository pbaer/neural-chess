name: Agent — address PR feedback

# When the maintainer leaves review feedback on an agent-authored PR, Claude Code
# updates the PR branch to address it — looping until the maintainer approves.
#
# Two entry points:
#   1. A submitted review (Request changes / Comment, NOT Approve) by @pbaer on a
#      branch named `agent/*`. No @claude needed — leaving review feedback is the
#      signal.
#   2. A plain PR comment by @pbaer that mentions @claude (an explicit nudge).
#
# As in agent-implement.yml, Claude only edits + validates; the workflow does the
# commit/push deterministically. Approving a PR does not trigger the agent, so
# approval cleanly ends the loop. The agent never merges.

on:
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

# One run per PR at a time.
concurrency:
  group: agent-pr-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  address:
    if: >
      (github.event_name == 'pull_request_review'
        && github.event.review.user.login == 'pbaer'
        && github.event.review.state != 'approved'
        && startsWith(github.event.pull_request.head.ref, 'agent/'))
      ||
      (github.event_name == 'issue_comment'
        && github.event.issue.pull_request != null
        && github.event.comment.user.login == 'pbaer'
        && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out the PR branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr checkout "$PR_NUMBER"

      - name: Address feedback with Claude
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }} # for reading the PR thread
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            The maintainer left review feedback on pull request #${{ env.PR_NUMBER }}.
            Read CLAUDE.md at the repo root first. Then:
            - Read the PR description and the review, including inline comments, with
              `gh pr view ${{ env.PR_NUMBER }} --comments`, and address every point.
            - Update or add deterministic tests for any behavior you change.
            - Validate from `viz/`: `npm ci`, `npm run typecheck`, `npm test`, and
              `npm run build`. Fix any failures.
            - Do NOT commit, push, or merge — the workflow commits and pushes your
              working-tree changes to the PR branch automatically. Just leave your
              finished changes in the working tree.
          claude_args: |
            --allowedTools "Bash,Edit,MultiEdit,Write,Read,Glob,Grep,NotebookEdit,TodoWrite"
            --max-turns 80
            --model claude-sonnet-5

      - name: Push updates to the PR branch and reply
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git add -A
          if git diff --cached --quiet && [ "$(git rev-list --count @{u}..HEAD 2>/dev/null || echo 0)" -eq 0 ]; then
            echo "No changes to push."
            exit 0
          fi
          git config user.name "claude-agent[bot]"
          git config user.email "claude-agent[bot]@users.noreply.github.com"
          git diff --cached --quiet || git commit -m "Agent: address review feedback on #$PR_NUMBER"
          BR="$(git rev-parse --abbrev-ref HEAD)"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" "HEAD:$BR"
          gh pr comment "$PR_NUMBER" --body "Addressed the review feedback and pushed updates to \`$BR\`. Validation (typecheck/test/build) was run in the agent step."
