name: Deploy viz to GitHub Pages

# Builds the in-browser visualization tool (viz/) and publishes viz/dist to
# GitHub Pages. The app's vite base is /neural-chess/, matching this repo, so it
# serves at https://pbaer.github.io/neural-chess/.

on:
  push:
    branches: [master]
    paths:
      - 'viz/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on a new push.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viz
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: viz/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: viz/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      # Whichever attempt succeeded supplies the URL (|| = first non-empty).
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy3.outputs.page_url }}
    steps:
      # actions/deploy-pages intermittently fails with "Deployment failed, try
      # again later" (a transient GitHub Pages backend error, build unaffected).
      # Retry up to 3 times with backoff so the deploy self-heals. Each attempt
      # is gated on the previous one having failed; the first two are non-fatal.
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Backoff before attempt 2
        if: steps.deploy1.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Backoff before attempt 3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 90

      # Final attempt — NOT continue-on-error, so if this fails the job fails.
      - name: Deploy to GitHub Pages (attempt 3, final)
        id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
